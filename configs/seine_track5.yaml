# SEINE inference config for AI City 2026 Track 5 (TV2V future prediction).
# Consumed by baselines/seine_infer.py. Paths assume you run from the
# aicity_track5/ repo root with third_party/SEINE reachable (see --seine_root).

# ---- paths (override on Colab) ----
ckpt: "pretrained/seine.pt"
pretrained_model_path: "pretrained/stable-diffusion-v1-4/"

# ---- SEINE model config (do not change unless you know the ckpt) ----
model: UNet
num_frames: 16          # SEINE clip length (fixed by the checkpoint)
# Generation resolution (h, w), multiples of 8. Output is resized back to each
# sample's native 1280x720 afterwards, so this only sets the model's working
# canvas. [288, 512] matches 16:9 exactly (1280/720 = 288/512 = 1.778) -> least
# distortion on upscale. [320, 512] is the other well-tested SEINE size.
image_size: [288, 512]

# ---- speed ----
use_fp16: True
enable_xformers_memory_efficient_attention: True

# ---- sampling ----
seed: 0
cfg_scale: 5.0          # lower = appearance stays closer to the conditioning frame
                        # (less text-driven drift over long rollouts). Try 3-5.
sample_method: "ddim"          # 'ddim' is ~5x faster than 'ddpm' at similar quality
num_sampling_steps: 30         # ddim 30: fast draft for a first valid submission.
                               # Bump to 50-100 later when optimizing quality.
do_classifier_free_guidance: True
negative_prompt: ""
additional_prompt: ", static fixed traffic surveillance camera, realistic, high detail."
use_mask: True

# ---- Track 5 prediction logic ----
# Number of history frames used as the conditioning prefix per clip.
# 1 == classic SEINE I2V (animate from the single last history frame); a small
# K maximizes generated frames per clip and minimizes autoregressive drift.
cond_frames: 2
# Overlap frames carried into the next autoregressive window (the last
# `cond_frames` generated frames re-condition the next clip).
